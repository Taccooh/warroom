# Server variant behind a reverse proxy on the same Docker network: no host port.
# Everything persistent (SQLite DB, master.key, vapid.pem) lives in the ./data volume,
# NOT in the image. Standalone: replace expose with `ports: ["8000:8000"]`, drop networks.
services:
  warroom:
    build: .
    image: warroom:local
    container_name: warroom
    restart: unless-stopped
    networks:
      - caddy
    expose:
      - "8000"
    volumes:
      - ./data:/app/data

networks:
  caddy:
    name: caddy_default
    external: true
